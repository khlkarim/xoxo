<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XOXO</title>
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e6edf3;
    }

    h1 {
      color: white;
      margin-bottom: 1.6rem;
    }

    #picker {
      display: flex;
      gap: 10px;
      margin-top: 1.6rem;
    }

    .pick-btn {
      font-size: 1.1rem;
      font-weight: 800;
      padding: 0.4rem 1.4rem;
      border-radius: 999px;
      border: 2px solid transparent;
      cursor: pointer;
      letter-spacing: 0.1em;
      background: #161b22;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.1s;
    }
    .pick-btn:hover { transform: scale(1.06); }

    .pick-btn.x { color: #58a6ff; border-color: #58a6ff55; }
    .pick-btn.o { color: #f778ba; border-color: #f778ba55; }

    .pick-btn.x.active { background: #1a3a5c; border-color: #58a6ff; }
    .pick-btn.o.active { background: #3a1a2c; border-color: #f778ba; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows:    repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, border-color 0.15s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .cell:hover {
      background: #1f2937;
      border-color: #58a6ff44;
      transform: scale(1.03);
    }

    .cell.taken {
      cursor: default;
    }
    .cell.taken:hover {
      transform: none;
      background: #161b22;
      border-color: #30363d;
    }

    .cell.x-cell { color: #58a6ff; border-color: #58a6ff33; }
    .cell.o-cell { color: #f778ba; border-color: #f778ba33; }

    .cell.pop {
      animation: pop 0.2s ease;
    }
    @keyframes pop {
      0%   { transform: scale(0.85); }
      60%  { transform: scale(1.08); }
      100% { transform: scale(1);    }
    }

    #status {
      margin-top: 1.4rem;
      font-size: 0.8rem;
      color: #484f58;
      letter-spacing: 0.05em;
    }

    #reset {
      margin-top: 1.2rem;
      padding: 0.45rem 1.4rem;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: transparent;
      color: #8b949e;
      font-size: 0.8rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: border-color 0.2s, color 0.2s;
    }
    #reset:hover {
      border-color: #58a6ff;
      color: #58a6ff;
    }
  </style>
</head>
<body>
  <h1>It's a tie!</h1>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="picker">
    <button class="pick-btn x active" data-team="X">X</button>
    <button class="pick-btn o"        data-team="O">O</button>
  </div>

<script>
  const db  = Gun(['https://gun.o8.is/gun']);

  const state = Array(9).fill(null);
  const grid = db.get('xo-demo-grid-v1');

  let team = 'X';
  document.querySelectorAll('.pick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      team = btn.dataset.team;
      document.querySelectorAll('.pick-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  const h1 = document.querySelector('h1');
  const cells = document.querySelectorAll('.cell');

  function renderCell(i, val) {
    const el = cells[i];
    el.textContent = val || '';
    el.className   = 'cell' + (val ? ` ${val.toLowerCase()}-cell taken` : '');
  }

  function pop(i) {
    cells[i].classList.remove('pop');
    void cells[i].offsetWidth;
    cells[i].classList.add('pop');
  }

  const LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6],
  ];

  function checkWinner() {
    cells.forEach(c => c.classList.remove('win-cell'));
 
    for (const [a, b, c] of LINES) {
      if (state[a] && state[a] === state[b] && state[a] === state[c]) {
        const w = state[a];
        h1.textContent = `Team ${w} is winning!`;
        h1.style.color = w === 'X' ? '#58a6ff' : '#f778ba';
        [a, b, c].forEach(i => cells[i].classList.add('win-cell'));
        return;
      }
    }
 
    const filled = state.filter(Boolean).length;
    if (filled === 9) {
      h1.textContent = "It's a tie!";
      h1.style.color = '#8b949e';
      return;
    }
 
    const xs = state.filter(v => v === 'X').length;
    const os = state.filter(v => v === 'O').length;
    if (xs > os) { h1.textContent = 'Team X is winning!'; h1.style.color = '#58a6ff'; }
    else if (os > xs) { h1.textContent = 'Team O is winning!'; h1.style.color = '#f778ba'; }
    else { h1.textContent = "It's a tie!"; h1.style.color = 'white'; }
  }

  grid.on(data => {
    for (let i = 0; i < 9; i++) {
      const key = 'c' + i;
      const incoming = data[key] === 'X' ? 'X' : data[key] === 'O' ? 'O' : null;
      if (incoming !== state[i]) {
        state[i] = incoming;
        renderCell(i, incoming);
        if (incoming) pop(i);
      }
    }
    checkWinner();
  });

  cells.forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.i, 10);

      const key = 'c' + i;
      state[i] = team;
      renderCell(i, team);
      pop(i);

      grid.put({ [key]: team });
    });
  });
</script>

  </body>
</html>
